<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>World Cup 2026 · Live Bracket</title>
<style>
:root{--ink:#111;--paper:#f6f3ea;--wash:#dfdcd3;--muted:#666}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;background:#d7d4cc;color:var(--ink);font-family:Arial,Helvetica,sans-serif}body{display:grid;place-items:center}.sheet{width:800px;height:480px;overflow:hidden;background:var(--paper);border:3px solid var(--ink);padding:9px 10px}.head{height:40px;border-bottom:2px solid var(--ink);display:flex;justify-content:space-between;align-items:flex-start}.title{font-size:17px;font-weight:900;letter-spacing:.25px}.sub,.updated{font-size:7px;line-height:10px;font-weight:700;letter-spacing:.45px}.updated{text-align:right}.updated b{font-size:8px}.grid{height:405px;padding-top:6px;display:grid;grid-template-columns:141px 92px 70px 63px 108px 63px 70px 92px 141px;gap:4px}.col{position:relative;min-width:0}.label{height:14px;border-bottom:1px solid var(--ink);font-size:7px;letter-spacing:.55px;font-weight:900;text-transform:uppercase}.slots{height:382px;position:relative}.match{position:absolute;width:100%;min-height:27px;border:1px solid var(--ink);background:var(--paper);padding:2px 3px;overflow:hidden}.match.final{border:2px solid var(--ink);min-height:51px;padding:4px 5px}.meta{font-size:5.6px;line-height:7px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.team{font-size:7px;line-height:9px;font-weight:800;display:grid;grid-template-columns:minmax(0,1fr) 10px;gap:2px}.team .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.team.winner{background:var(--wash)}.pending .name{color:var(--muted);font-weight:700}.score{text-align:right;font-weight:900}.centre{text-align:center}.trophy{font-size:19px;line-height:20px;margin-top:78px}.final-title{font-size:8px;font-weight:900;margin:4px 0 7px}.final-note{font-size:5.8px;line-height:7.5px;color:var(--muted);margin-top:7px}.foot{height:16px;border-top:1px solid var(--ink);padding-top:4px;display:flex;justify-content:space-between;font-size:6.4px;font-weight:700}.control{position:fixed;right:12px;bottom:12px;border:1px solid #222;background:#fff;padding:7px 9px;font:12px Arial;cursor:pointer;box-shadow:0 1px 3px #999}@media (max-width:800px),(max-height:480px){body{display:block;background:var(--paper)}.sheet{transform-origin:top left;border-width:2px}.control{display:none}}@media print{body{background:#fff}.sheet{margin:0}.control{display:none}}
</style>
</head>
<body>
<main class="sheet" aria-label="World Cup 2026 live knockout bracket">
<header class="head"><div><div class="title">WORLD CUP 2026 · ROAD TO THE FINAL</div><div class="sub">ONE-PAGE LIVE BRACKET · SINGAPORE TIME (SGT)</div></div><div class="updated" id="status"><b>LOADING LIVE SCORES</b><br>Preparing bracket…</div></header>
<section class="grid" id="bracket"></section>
<footer class="foot"><span>Scores update automatically. Winners are shaded.</span><span id="source">Live feed + local fallback</span></footer>
</main>
<button class="control" onclick="location.reload()">Refresh</button>
<script>
(() => {
  const SGT = 'Asia/Singapore';
  const API = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=500&dates=20260601-20260731';
  const fallbackUrl = './public/data/live.json';
  const leftR32 = ['M73','M74','M77','M78','M81','M82','M85','M86'];
  const rightR32 = ['M75','M76','M79','M80','M83','M84','M87','M88'];
  const cfg = {};
  for(let n=73;n<=88;n++) cfg['M'+n]={id:'M'+n,round:'R32'};
  for(let n=89;n<=96;n++) cfg['M'+n]={id:'M'+n,round:'R16',parents:['M'+(73+(n-89)*2),'M'+(74+(n-89)*2)]};
  cfg.M97={id:'M97',round:'QF',parents:['M89','M91']}; cfg.M98={id:'M98',round:'QF',parents:['M90','M92']};
  cfg.M99={id:'M99',round:'QF',parents:['M93','M95']}; cfg.M100={id:'M100',round:'QF',parents:['M94','M96']};
  cfg.M101={id:'M101',round:'SF',parents:['M97','M99']}; cfg.M102={id:'M102',round:'SF',parents:['M98','M100']};
  cfg.M103={id:'M103',round:'3rd',parents:['M101','M102']}; cfg.M104={id:'M104',round:'Final',parents:['M101','M102']};
  const state = {}; Object.values(cfg).forEach(x => state[x.id]={...x,teams:[null,null],score:['–','–'],status:'scheduled',time:null,venue:'',winner:null});
  const pad=n=>String(n).padStart(2,'0');
  function asSGT(iso){ if(!iso) return ''; try{return new Intl.DateTimeFormat('en-GB',{timeZone:SGT,day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(iso)).replace(',',' ·')}catch{return ''} }
  function short(name){return (name||'TBD').replace(/^Winner\s+/i,'W ').replace(/^Loser\s+/i,'L ')}
  function eventMatchNo(ev){
    const hay=[ev.name,ev.shortName,ev.notes?.[0]?.headline,ev.competitions?.[0]?.notes?.[0]?.headline].filter(Boolean).join(' ');
    const m=hay.match(/(?:match|game)\s*(\d{2,3})/i); if(m) return 'M'+m[1];
    // ESPN often exposes a sequential game number only in the title; keep unmatched events harmless.
    return null;
  }
  function applyRecord(rec){
    const m=state[rec.id]; if(!m) return;
    m.time=rec.time||m.time; m.venue=rec.venue||m.venue; m.status=rec.status||m.status;
    if(Array.isArray(rec.teams)){m.teams=rec.teams.map(t=>t?{name:t.name||t.displayName||'TBD',score:t.score ?? '–',winner:!!t.winner}:null);m.score=m.teams.map(t=>t?.score??'–');}
    if(rec.winner){m.winner=rec.winner;}
  }
  function derive(){
    for(const id of Object.keys(state)){
      const m=state[id]; if(!m.parents) continue;
      m.parents.forEach((p,i)=>{
        const pm=state[p]; if(pm?.winner && !m.teams[i]) m.teams[i]={name:pm.winner,score:'–',winner:false};
        if(!m.teams[i]) m.teams[i]={name:'Winner '+p,score:'–',winner:false};
      });
    }
  }
  function matchHTML(id,top,cls=''){
    const m=state[id], teams=m.teams||[]; const a=teams[0]||{name:'TBD',score:'–'},b=teams[1]||{name:'TBD',score:'–'};
    const meta=[id,m.time?asSGT(m.time):'',m.venue].filter(Boolean).join(' · ');
    const row=t=>`<div class="team ${t.winner?'winner':''} ${/^(TBD|Winner )/.test(t.name)?'pending':''}"><span class="name">${short(t.name)}</span><span class="score">${t.score ?? '–'}</span></div>`;
    return `<div class="match ${cls}" style="top:${top}px"><div class="meta">${meta||id}</div>${row(a)}${row(b)}</div>`;
  }
  function column(label, ids, tops, cls=''){return `<div class="col ${cls}"><div class="label">${label}</div><div class="slots">${ids.map((id,i)=>matchHTML(id,tops[i])).join('')}</div></div>`}
  function render(){
    derive();
    const r32tops=[2,47,92,137,182,227,272,317], r16tops=[25,115,205,295], qftops=[70,250];
    document.getElementById('bracket').innerHTML =
      column('Round of 32 · Route A',leftR32,r32tops)+
      column('Round of 16',['M89','M91','M93','M95'],r16tops)+
      column('Quarter-finals',['M97','M99'],qftops)+
      column('Semi-finals',['M101'],[158])+ 
      `<div class="col centre"><div class="label">Final</div><div class="trophy">★</div><div class="final-title">WORLD CUP FINAL</div>${matchHTML('M104',0,'final')}<div class="final-note">Third-place match<br>${state.M103.time?asSGT(state.M103.time):'M103 · 19 JUL'}</div></div>`+
      column('Semi-finals',['M102'],[158])+column('Quarter-finals',['M98','M100'],qftops)+
      column('Round of 16',['M90','M92','M94','M96'],r16tops)+column('Round of 32 · Route B',rightR32,r32tops);
  }
  function setStatus(text,detail){document.getElementById('status').innerHTML=`<b>${text}</b><br>${detail}`}
  function stamp(){return new Intl.DateTimeFormat('en-GB',{timeZone:SGT,hour:'2-digit',minute:'2-digit',hour12:false,day:'2-digit',month:'short'}).format(new Date()).replace(',',' · ')}
  async function loadFallback(){const r=await fetch(fallbackUrl+'?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error('fallback unavailable');const j=await r.json();(j.matches||[]).forEach(applyRecord);return j.updatedAt||null}
  function mapEspn(j){
    let count=0;
    (j.events||[]).forEach(ev=>{
      const id=eventMatchNo(ev);if(!id||!state[id])return;
      const c=ev.competitions?.[0];const cc=c?.competitors||[];if(cc.length<2)return;
      const teams=cc.sort((x,y)=>(x.homeAway==='home'?-1:1)).map(x=>({name:x.team?.displayName||x.team?.shortDisplayName||'TBD',score:x.score??'–',winner:!!x.winner}));
      const complete=ev.status?.type?.completed;const winner=teams.find(t=>t.winner)?.name||null;
      applyRecord({id,time:ev.date,venue:c?.venue?.fullName,status:complete?'final':ev.status?.type?.state,teams,winner});count++;
    }); return count;
  }
  async function boot(){
    let localAt=null;try{localAt=await loadFallback()}catch(e){}
    render();setStatus('LIVE BRACKET', localAt?`Cached ${localAt}`:`Updated ${stamp()}`);
    try{
      const r=await fetch(API,{cache:'no-store'});if(!r.ok)throw Error('live feed '+r.status);const count=mapEspn(await r.json());
      if(count){render();document.getElementById('source').textContent='Live feed · refreshed '+stamp();setStatus('LIVE SCORES',`Updated ${stamp()}`)}
      else {document.getElementById('source').textContent='Local schedule · refreshed '+stamp();setStatus('SCHEDULE MODE',`Updated ${stamp()}`)}
    }catch(e){document.getElementById('source').textContent='Local fallback · refreshed '+stamp();setStatus('OFFLINE FALLBACK',`Updated ${stamp()}`)}
  }
  boot(); setInterval(boot,15*60*1000);
})();
</script>
</body>
</html>
