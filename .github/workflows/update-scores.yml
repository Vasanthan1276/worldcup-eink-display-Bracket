name: Update World Cup scores
on:
  workflow_dispatch:
  schedule:
    - cron: '7 * * * *'
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/update_scores.mjs
      - name: Commit refreshed score cache
        run: |
          git config user.name "worldcup-score-bot"
          git config user.email "actions@github.com"
          git add public/data/live.json
          git diff --staged --quiet || git commit -m "Update World Cup scores"
          git push
